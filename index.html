<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for You! | 🎂🎁🎈</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --purple-soft: #b4a7d6;
            --text-gray: #a3a3a3;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            overflow-y: auto; 
            position: relative;
            padding: 40px 0;
        }

        /* --- INTRO PAGE --- */
        #intro-page {
            text-align: center; z-index: 20; position: fixed;
            transition: opacity 0.8s ease;
        }

        .envelope-wrapper {
            filter: drop-shadow(0 10px 15px rgba(108, 92, 231, 0.2));
            cursor: pointer;
        }

        .envelope-img {
            width: 120px; margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        .intro-text h1 { font-family: 'Dancing Script', cursive; font-size: 45px; color: var(--primary); margin: 0; }
        .intro-text p { color: #555; margin-bottom: 25px; }
        
        .btn-open {
            background: linear-gradient(to right, #b2a4ff, #6c5ce7);
            color: white; border: none; padding: 15px 45px;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
            transition: 0.3s;
        }

        .btn-open:hover { transform: scale(1.05); }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- MAIN CONTENT --- */
        #main-content {
            display: none; opacity: 0; width: 90%; max-width: 400px;
            transition: opacity 1s ease; z-index: 10;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px; padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative; border: 2px solid var(--purple-soft);
            margin-top: 20px;
        }

        /* --- HEADER LAYOUT --- */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center; /* Sejajar secara vertikal */
            margin-bottom: 15px;
        }

        .header-text {
            flex: 1;
        }

        /* --- MUSIC BUTTON (Bulat Putih) --- */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .music-control {
            background-color: white; 
            width: 45px; height: 45px; 
            border-radius: 50%; /* Membuat tombol bulat sempurna */
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border: 1px solid #f0f0f0;
            font-size: 20px;
            animation: spin 4s linear infinite;
            transition: all 0.3s ease;
            margin-left: 10px;
        }

        .music-paused {
            animation-play-state: paused;
            background-color: #fcfcfc;
            opacity: 0.8;
        }

        .marquee-container {
            position: absolute; top: -40px; left: 0; width: 100%; overflow: hidden; white-space: nowrap;
        }

        .marquee-text {
            display: inline-block; font-weight: bold; color: white; font-size: 14px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            animation: scrollText 25s linear infinite;
        }

        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .main-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 26px; color: #8e7cc3; margin: 0; }
        .sub-date { font-family: 'Playfair Display', serif; font-size: 13px; color: var(--text-gray); margin: 3px 0 0 0; }
        .hbd-text { font-family: 'Pacifico', cursive; font-size: 24px; text-align: center; color: var(--primary); margin: 15px 0 5px 0; }

        #typing-text { line-height: 1.8; color: #444; font-size: 14px; min-height: 140px; text-align: left; }
        .cursor { display: inline-block; width: 2px; height: 1.2em; background: var(--primary); animation: blink 0.7s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }

        #hidden-parts { display: none; opacity: 0; transition: 1.5s ease; border-top: 2px dashed #eee; margin-top: 25px; padding-top: 20px; }
        .signature h3 { font-family: 'Dancing Script', cursive; font-size: 30px; color: var(--primary); text-align: center; margin: 5px 0; }

        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #eee; outline: none; font-family: inherit; box-sizing: border-box; }
        .btn-wa { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-wa:hover { background: #5649c1; }

        .party-item { position: fixed; animation: fall linear forwards; pointer-events: none; z-index: 1; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <audio id="myAudio" loop>
        <source src="https://raw.githubusercontent.com/AnRhmn/Project/main/Monokrom.mpeg" type="audio/mpeg">
    </audio>

    <div id="intro-page">
        <div class="envelope-wrapper" onclick="bukaSurat()">
            <svg class="envelope-img" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 6C2 4.89543 2.89543 4 4 4H20C21.1046 4 22 4.89543 22 6V18C22 19.1046 21.1046 20 20 20H4C2.89543 20 2 19.1046 2 18V6Z" stroke="#6c5ce7" stroke-width="1.5"/>
                <path d="M2 7L10.1632 12.7142C11.2585 13.481 12.7415 13.481 13.8368 12.7142L22 7" stroke="#6c5ce7" stroke-width="1.5"/>
                <circle cx="12" cy="11" r="2" fill="#ff7675"/>
            </svg>
        </div>
        <div class="intro-text">
            <h1>Untuk Kamu</h1>
            <p>Sebuah Pesan Kecil</p>
            <button class="btn-open" onclick="bukaSurat()">Buka Surat</button>
        </div>
    </div>

    <div id="main-content">
        <div class="card">
            <div class="marquee-container">
                <div class="marquee-text">✨ THIS IS FOR YOU ✨ 16 MARET 2026 ✨ HAPPY BIRTHDAY! ✨</div>
            </div>
            
            <div class="card-header">
                <div class="header-text">
                    <h1 class="main-title">This is For U.</h1>
                    <p class="sub-date">Senin, 16 Maret 2026</p>
                </div>
                <div class="music-control" id="musicBtn" onclick="toggleMusic()">🎵</div>
            </div>
            
            <div style="text-align:center;"><p style="font-size:50px; margin:0;">🎂</p></div>
            <h2 class="hbd-text">Happy Birthday!</h2>
            
            <div id="typing-text"></div>
            
            <div id="hidden-parts">
                <div class="signature">
                    <p style="text-align:center; font-size:12px; color:#888;">Dari si pria cool,</p>
                    <h3>A!</h3>
                </div>
                <input type="text" id="nama" placeholder="Nama kamu...">
                <textarea id="pesan" rows="2" placeholder="Tulis balasanmu..."></textarea>
                <button class="btn-wa" onclick="sendToWA()">Kirim ke WhatsApp 📱</button>
            </div>
        </div>
    </div>

    <script>
        const message = "Happy Birthday Aurahma Andryastiwi, Semoga panjang umur sehat selalu apa yang kamu cita-citakan bisa tercapai selalu dimudahkan segala urusannya. Semoga selalu dikelilingi oleh orang baik dan pada tahun ini kamu bisa mendapatkan lebih banyak kebahagiaan, pengalaman baru yang menyenangkan, dan cerita-cerita indah yang nantinya bisa kamu kenang. Pokoknya semoga semua hal baik selalu datang menghampiri kamu. Selamat ulang tahun sekali lagii !!";
        const audio = document.getElementById("myAudio");
        const musicBtn = document.getElementById("musicBtn");

        function bukaSurat() {
            document.getElementById('intro-page').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-page').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                
                audio.play().catch(e => {
                    console.log("Autoplay dicegah.");
                    musicBtn.classList.add("music-paused");
                });
                
                setTimeout(() => {
                    document.getElementById('main-content').style.opacity = '1';
                    typeWriter();
                    setInterval(createPartyItem, 400);
                }, 100);
            }, 800);
        }

        let index = 0;
        function typeWriter() {
            if (index < message.length) {
                document.getElementById("typing-text").innerHTML = message.substring(0, index) + '<span class="cursor"></span>';
                index++;
                setTimeout(typeWriter, 70);
            } else {
                document.getElementById("typing-text").innerHTML = message;
                document.getElementById("hidden-parts").style.display = "block";
                setTimeout(() => { document.getElementById("hidden-parts").style.opacity = "1"; }, 100);
            }
        }

        function createPartyItem() {
            const item = document.createElement('div');
            item.className = 'party-item';
            const items = ['🎂', '🎁', '🎈', '🎉', '✨', '🌸'];
            item.innerHTML = items[Math.floor(Math.random() * items.length)];
            item.style.left = Math.random() * 100 + 'vw';
            item.style.fontSize = Math.random() * 20 + 15 + 'px';
            item.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 5000);
        }

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                musicBtn.classList.remove("music-paused");
            } else {
                audio.pause();
                musicBtn.classList.add("music-paused");
            }
        }

        function sendToWA() {
            const nama = document.getElementById('nama').value;
            const pesan = document.getElementById('pesan').value;
            const nomorWA = "6283848060462"; 
            
            if (nama.trim() === "") {
                alert("Masukkan nama kamu dulu ya!");
                return;
            }

            const teksWA = `Halo Ali! Aku ${nama}.%0A%0A${pesan}`;
            window.open(`https://api.whatsapp.com/send?phone=${nomorWA}&text=${teksWA}`, '_blank');
        }
    </script>
</body>
</html>
